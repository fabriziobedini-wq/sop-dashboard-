name: SOP Strategy Monitor v2

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: sop_state.json
          key: sop-state-${{ github.run_id }}
          restore-keys: |
            sop-state-

      - name: Run SOP monitor v2
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: python sop_monitor_v2.py

      - name: Save state
        uses: actions/cache@v4
        with:
          path: sop_state.json
          key: sop-state-${{ github.run_id }}
